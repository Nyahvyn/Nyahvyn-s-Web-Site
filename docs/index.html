<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Nyahvyn, Portfolio, Github">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="./css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Zen+Kurenaido&display=swap" rel="stylesheet">
    <title>Nyahvyn :D</title>
    <link rel="icon" type="image/png" href="./web-icon/favicon.png">
  </head>

  <body>
    <header>
      <h3>Nyahvyn's Page :D</h3>

      <div class="right-group">
        <div>
          <a href="#about">About Me</a>
        </div>

        <div>
          <a href="#skills">Skills</a>
        </div>

        <div>
          <a href="#social">Social Links</a>
        </div>

        <button class="theme">
          <img src="../imgs/light-mode.svg">
        </button>
      </div>
    </header>
    
    <main>
      <section class="home">
        <h1>Nyahvyn's Page</h1>
        <p>welcome~~~ :D</p>
      </section>
      
      <section id="about" class="aboutme hidden">
        <div class="card">
          <h2>About Me</h2>
          <p>I'm Nyahvyn self-taught developer :D<br>
            I'm working on a variety of projects!</p>
        </div>
      </section>

      <section id="skills" class="skills hidden">
        <div class="card">
          <h2>Skills</h2>
          <div class="loop_window">
            <div class="loop">
              <div class="items">
                <div class="item">
                  <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg">
                  <a>Python</a>
                </div>
            
                <div class="item">
                  <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg">
                  <a>HTML</a>
                </div>

                <div class="item">
                  <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg">
                  <a>CSS</a>
                </div>

                <div class="item">
                  <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg">
                  <a>JavaScript</a>
                </div>

                <div class="item">
                  <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/typescript/typescript-original.svg">
                  <a>TypeScript</a>
                </div>

                <div class="item">
                  <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg">
                  <a>Node.js</a>
                </div>

                <div class="item">
                  <img class="need_inversion" src="https://cdn.simpleicons.org/roblox">
                  <a>Luau(Little)</a>
                </div>
              </div>
            </div>
          </div>  
          <p>And So On...</p>
        </div>
      </section>

      <section id="social" class="social_link hidden">
        <div class="card">
          <h2>Social Links</h2>
          <img class="big need_inversion" src="https://cdn.simpleicons.org/github">
          <a href="https://github.com/Nyahvyn" target="_blank">Go to Github Page</a>
        </div>
      </section>
    </main>

    <footer>
      &copy; 2026 Nyahvyn
    </footer>

    <script src="./javascripts/theme.js"></script>
    <script src="./javascripts/hidden.js"></script>
    <script src="./javascripts/scrollSpeed.js"></script>
  </body>
</html>
